kind = "web"
previewPath = "/"
title = "Wanderly - Pollinate the World"
version = "1.0.0"
id = "artifacts/wanderly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24445

[services.development]
run = "pnpm --filter @workspace/wanderly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wanderly", "run", "build" ]
publicDir = "artifacts/wanderly/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24445"
BASE_PATH = "/"
